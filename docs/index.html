<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Todo Web App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        ul { list-style: none; padding: 0; }
        li { margin: 10px 0; padding: 8px; border-bottom: 1px solid #eee; }
        .done { text-decoration: line-through; color: gray; }
        input, button { margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo Web App</h1>
        <form id="todoForm">
            <input type="text" id="taskInput" placeholder="タスクを入力">
            <button type="submit" id="addButton">追加</button>
        </form>
        <ul id="taskList"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
