<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>やることリスト</title>
    <style>
        /* カラフルなテーマとアニメーションを含むCSSスタイル */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4); /* グラデーション背景 */
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.9); /* 半透明な白い背景 */
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15); /* ボックスシャドウ効果 */
            padding: 1.5rem;
        }
        h1 {
            text-align: center;
            color: #4a2c7d;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        input {
            padding: 0.8rem;
            width: 100%;
            border-radius: 6px;
            border: 2px solid #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input:focus {
            border-color: #4a2c7d;
        }
        button {
            padding: 0.8rem 1.2rem;
            background: linear-gradient(135deg, #ff7e5f, #5a4e99); /* グラデーションボタン */
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease;
        }
        button:hover {
            transform: scale(1.05);
        }
        ul {
            list-style: none;
            padding: 0;
            margin-top: 1rem;
        }
        li {
            padding: 0.9rem;
            margin-bottom: 0.6rem;
            background: #fdfdfd;
            border-left: 4px solid transparent;
            border-radius: 4px;
            transition: all 0.2s ease;
            color: #333;
        }
        li:hover {
            background: #f0f0f0;
            transform: scale(1.03);
        }
        .done {
            text-decoration: line-through;
            color: #888;
            background: #fafafa;
            border-left-color: #a333c9;
            animation: slide-in 0.3s ease forwards;
        }
        .new {
            animation: fade-in 0.3s ease forwards;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            margin-left: 8px;
            transition: color 0.2s ease;
        }
        .delete-btn:hover {
            color: #c03925;
        }
        /* アニメーション定義 */
        @keyframes slide-in {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
      </style>
    </body>
</html>
</head>
<body>
    <div class="container">
        <h1>やることリスト</h1>
        <form id="todoForm">
            <input type="text" id="taskInput" placeholder="タスクを入力">
            <button type="submit" id="addButton">追加</button>
        </form>
        <ul id="taskList"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
